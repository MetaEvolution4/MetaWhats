version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: metawhats_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-metawhats}
    volumes:
      - metawhats_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: metawhats_redis
    restart: always
    volumes:
      - metawhats_redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metawhats_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-metawhats}?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_12345}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_jwt_refresh_key_12345}
    volumes:
      - metawhats_uploads:/app/uploads

volumes:
  metawhats_pgdata:
  metawhats_redisdata:
  metawhats_uploads:
