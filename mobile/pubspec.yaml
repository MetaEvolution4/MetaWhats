name: metawhats
description: "A WhatsApp clone MVP."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.9.2
  socket_io_client: ^3.1.6
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.0.0
  go_router: ^17.3.0
  intl: ^0.19.0
  sqflite: ^2.4.3
  path: ^1.8.3
  cached_network_image: ^3.3.1
  uuid: ^4.3.3
  cryptography: ^2.7.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  record: ^5.0.5
  audioplayers: ^6.0.0
  encrypt: ^5.0.3
  libsignal_protocol_dart: any
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_webrtc: 1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
